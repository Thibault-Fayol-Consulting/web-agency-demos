<!DOCTYPE html><html lang="fr"><head>

<style>

    </div>
    <a href="tel:0953768569" style="background:var(--a);color:#fff;font-weight:700;padding:.4rem .9rem;font-size:.8rem;display:flex;align-items:center;gap:.35rem"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg> 09 53 76 85 69</a>

<section style="background:var(--b);padding:3rem 1.25rem 2.5rem">
  <div style="max-width:64rem;margin:0 auto">
    <p style="color:rgba(255,255,255,.35);font-size:.62rem;margin-bottom:.75rem">Montpellier &middot; Coiffeur</p>
    <h1 style="font-family:'Cormorant Garamond',serif;color:#fff;font-weight:700;font-size:clamp(1.8rem,5vw,3rem);line-height:1.1">Nous contacter</h1>

<section style="padding:3.5rem 1.25rem">

      <form action="https://formspree.io/f/FORM_ID" method="POST" style="display:flex;flex-direction:column;gap:.65rem">
        <input name="nom" type="text" placeholder="Votre nom *" required style="padding:.8rem 1rem;border:1px solid #e8e8e8;font-size:.875rem;font-family:inherit;background:#fafafa;outline:none;width:100%">
        <input name="telephone" type="tel" placeholder="Votre téléphone *" required style="padding:.8rem 1rem;border:1px solid #e8e8e8;font-size:.875rem;font-family:inherit;background:#fafafa;outline:none;width:100%">
        <input name="email" type="email" placeholder="Votre email" style="padding:.8rem 1rem;border:1px solid #e8e8e8;font-size:.875rem;font-family:inherit;background:#fafafa;outline:none;width:100%">
        <textarea name="message" rows="4" placeholder="Votre message *" required style="padding:.8rem 1rem;border:1px solid #e8e8e8;font-size:.875rem;font-family:inherit;resize:none;background:#fafafa;outline:none;width:100%"></textarea>
        <button type="submit" style="background:var(--b);color:#fff;font-family:'Cormorant Garamond',serif;font-weight:700;padding:1rem;font-size:.95rem;border:none;cursor:pointer;width:100%">Envoyer</button>

    </div>
    <div>
      <p style="color:#6b6b6b;font-size:.62rem;margin-bottom:1.25rem">Informations</p>
      <div style="display:flex;flex-direction:column;gap:2rem">
        <div><p style="color:#6b6b6b;font-size:.6rem;margin-bottom:.4rem">Téléphone</p><a href="tel:0953768569" style="font-family:'Cormorant Garamond',serif;color:var(--a);font-size:1.75rem;font-weight:700;display:block">09 53 76 85 69</a></div>
        <div><p style="color:#6b6b6b;font-size:.6rem;margin-bottom:.4rem">Adresse</p><p style="color:#555;font-size:.9rem;line-height:1.65">Rue du Faubourg du Courreau, 34060 Montpellier</p></div>
        <div><p style="color:#6b6b6b;font-size:.6rem;margin-bottom:.4rem">Horaires</p><p style="color:#555;font-size:.9rem;line-height:1.65">Mar-Sam 9h-19h</p></div>
        
      </div>
    </div>
  </div>

  </div>
</footer>
